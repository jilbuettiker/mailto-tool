<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Öffne Mail-App · Hasler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f4;
      --surface: #ffffff;
      --border: #e0ddd8;
      --accent: #1a2744;
      --accent-gold: #b8965a;
      --text: #1a1a1a;
      --text-muted: #888;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrap {
      padding: 40px 24px;
      max-width: 420px;
      width: 100%;
    }

    /* Logo top */
    .logo {
      margin-bottom: 52px;
      display: flex;
      justify-content: center;
    }

    .logo img {
      height: 36px;
      width: auto;
      opacity: 0.85;
    }

    .icon {
      width: 68px; height: 68px;
      margin: 0 auto 28px;
      border: 1.5px solid var(--accent-gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .icon svg { width: 26px; height: 26px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.96); }
    }

    h1 {
      font-weight: 300;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .email-display {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent-gold);
      margin-bottom: 36px;
      word-break: break-all;
    }

    .manual-btn {
      display: inline-block;
      padding: 12px 32px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.15s;
      cursor: pointer;
      background: transparent;
    }

    .manual-btn:hover {
      background: var(--accent);
      color: #ffffff;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      line-height: 1.7;
    }

    .error-msg {
      display: none;
      margin-top: 20px;
      padding: 14px 18px;
      border: 1px solid #cc4444;
      border-radius: 6px;
      font-size: 13px;
      color: #cc4444;
      font-family: var(--mono);
    }

    .error-msg.show { display: block; }

    .footer-logo {
      margin-top: 60px;
      font-family: var(--mono);
      font-size: 11px;
      color: #c8c5bf;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="HASLER_LOGO_rgb.png" alt="Hasler">
    </div>

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#b8965a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
    </div>

    <h1>Mail-App wird geöffnet...</h1>
    <div class="email-display" id="email-display">—</div>

    <a class="manual-btn" id="manual-btn" href="#">Manuell öffnen</a>

    <p class="note" id="note">Passiert nichts? Tippe auf den Button.</p>

    <div class="error-msg" id="error-msg">
      Ungültige oder fehlende E-Mail-Adresse in der URL.
    </div>

    <div class="footer-logo">hasler · mailto redirect</div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const to = params.get('to');

      if (!to || !to.startsWith('mailto:')) {
        document.getElementById('error-msg').classList.add('show');
        document.getElementById('email-display').textContent = 'Fehler';
        document.getElementById('manual-btn').style.display = 'none';
        document.querySelector('.icon').style.borderColor = '#cc4444';
        document.querySelector('.icon svg').setAttribute('stroke', '#cc4444');
        return;
      }

      try {
        const raw = to.replace('mailto:', '').split('?')[0];
        document.getElementById('email-display').textContent = decodeURIComponent(raw);
      } catch(e) {
        document.getElementById('email-display').textContent = to;
      }

      document.getElementById('manual-btn').href = to;

      setTimeout(function () {
        window.location.href = to;
      }, 500);
    })();
  </script>
</body>
</html>
